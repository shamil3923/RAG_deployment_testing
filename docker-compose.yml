version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: kaya-rag-backend:latest
    ports:
      - "8000:8000"
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend:/app
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: "http://backend:8000"
    image: kaya-rag-frontend:latest
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
